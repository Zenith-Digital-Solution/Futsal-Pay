services:
  aspire-dashboard:
    container_name: "aspire-dashboard"
    image: "mcr.microsoft.com/dotnet/aspire-dashboard:latest"
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "false"
      ASPNETCORE_URLS: "http://+:18888"
      ASPNETCORE_ENVIRONMENT: "Production"
      DASHBOARD__FRONTEND__AUTHMODE: "BrowserToken"
      DASHBOARD__FRONTEND__BROWSERTOKEN: ${DASHBOARD_PASSWORD}
      DASHBOARD__OTLP__AUTHMODE: "ApiKey"
      DASHBOARD__OTLP__PRIMARYAPIKEY: ${DASHBOARD_API_KEY}
      DASHBOARD__OTLP__ENABLEHTTPRECEIVER: "true"
    ports:
      - target: 18888
        published: 18888
    restart: unless-stopped
    networks:
      - futsalnet

  cache:
    container_name: "cache"
    image: "docker.io/library/redis:latest"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      # OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      # OTEL_EXPORTER_OTLP_HEADERS: "x-otlp-api-key=${DASHBOARD_API_KEY}"
      # OTEL_SERVICE_NAME: "cache"
    ports:
      - target: 6379
        published: 6379
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
    restart: unless-stopped
    networks:
      - futsalnet

  db:
    container_name: "db"
    image: "docker.io/library/postgres:latest"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: "futsaldb"
      # OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      # OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      # OTEL_EXPORTER_OTLP_HEADERS: "x-otlp-api-key=${DASHBOARD_API_KEY}"
      # OTEL_SERVICE_NAME: "db"
    volumes:
      - "pgdata:/var/lib/postgresql/data"
    ports:
      - target: 5432
        published: 5432
    restart: unless-stopped
    networks:
      - futsalnet

  pgadmin:
    container_name: "pgadmin"
    image: "dpage/pgadmin4:latest"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      # OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      # OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      # OTEL_EXPORTER_OTLP_HEADERS: "x-otlp-api-key=${DASHBOARD_API_KEY}"
    ports:
      - target: 80
        published: 8081
    volumes:
      - "pgadmin_data:/var/lib/pgadmin"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - futsalnet

  apiservice:
    container_name: "apiservice"
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      PYTHONPATH: "."
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_SERVER: "db"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: "futsaldb"
      REDIS_HOST: "cache"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECURE_COOKIES: "True"
      PAYOUT_MODE: ${PAYOUT_MODE:-PLATFORM}
      PLATFORM_FEE_PCT: ${PLATFORM_FEE_PCT:-5.0}
      PLATFORM_KHALTI_SECRET_KEY: ${PLATFORM_KHALTI_SECRET_KEY:-}
      PLATFORM_KHALTI_MOBILE: ${PLATFORM_KHALTI_MOBILE:-}
      PLATFORM_ESEWA_MERCHANT_CODE: ${PLATFORM_ESEWA_MERCHANT_CODE:-}
      PLATFORM_ESEWA_SECRET_KEY: ${PLATFORM_ESEWA_SECRET_KEY:-}
      PLATFORM_BANK_NAME: ${PLATFORM_BANK_NAME:-}
      PLATFORM_BANK_ACCOUNT_NUMBER: ${PLATFORM_BANK_ACCOUNT_NUMBER:-}
      PLATFORM_BANK_ACCOUNT_NAME: ${PLATFORM_BANK_ACCOUNT_NAME:-}
      PLATFORM_BANK_SWIFT_CODE: ${PLATFORM_BANK_SWIFT_CODE:-}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-False}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
      POSTHOG_ENABLED: ${POSTHOG_ENABLED:-False}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://us.i.posthog.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET:-}
      SOCIAL_AUTH_REDIRECT_URL: ${SOCIAL_AUTH_REDIRECT_URL:-http://localhost:3000/auth/callback}
    ports:
      - target: 8000
        published: 8000
    volumes:
      - "uploads_data:/app/media"
    depends_on:
      - db
      - cache
    restart: unless-stopped
    networks:
      - futsalnet

  celery-worker:
    container_name: "celery-worker"
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A src.apps.core.celery_app worker --loglevel=info
    environment:
      PYTHONPATH: "."
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_SERVER: "db"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: "futsaldb"
      REDIS_HOST: "cache"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      POSTHOG_ENABLED: ${POSTHOG_ENABLED:-False}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://us.i.posthog.com}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-False}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
    volumes:
      - "uploads_data:/app/media"
    depends_on:
      - db
      - cache
    restart: unless-stopped
    networks:
      - futsalnet

  frontend:
    container_name: "frontend"
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://apiservice:8000}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
      NEXT_PUBLIC_GOOGLE_ENABLED: ${GOOGLE_ENABLED:-false}
      NEXT_PUBLIC_GITHUB_ENABLED: ${GITHUB_ENABLED:-false}
      NEXT_PUBLIC_FACEBOOK_ENABLED: ${FACEBOOK_ENABLED:-false}
    ports:
      - target: 3000
        published: 3000
    depends_on:
      - apiservice
    restart: unless-stopped
    networks:
      - futsalnet

volumes:
  pgdata: {}
  pgadmin_data: {}
  uploads_data: {}

networks:
  futsalnet:
